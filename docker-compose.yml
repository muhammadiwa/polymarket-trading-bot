services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pqap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pqap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pqap}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    command: --jetstream --store_dir /data
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm="]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Python Services ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ANALYTICS_PORT:-8084}:8084"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  backtesting:
    build:
      context: ./services/backtesting
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKTESTING_PORT:-8085}:8085"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  ai-optimizer:
    build:
      context: ./services/ai-optimizer
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AI_OPTIMIZER_PORT:-8086}:8086"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  ai-assistant:
    build:
      context: ./services/ai-assistant
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AI_ASSISTANT_PORT:-8087}:8087"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  strategy-manager:
    build:
      context: ./services/strategy-manager
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${STRATEGY_MANAGER_PORT:-8088}:8088"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  portfolio-manager:
    build:
      context: ./services/portfolio-manager
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORTFOLIO_MANAGER_PORT:-8089}:8089"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_PORT:-8090}:8090"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  account-manager:
    build:
      context: ./services/account-manager
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ACCOUNT_MANAGER_PORT:-8091}:8091"
    env_file: .env
    environment:
      POSTGRES_URL: postgres://${POSTGRES_USER:-pqap}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pqap}
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8080
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  nats_data:
